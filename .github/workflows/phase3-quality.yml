name: Phase 3 Quality

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/phase3-quality.yml'

jobs:
  phase3-baseline:
    name: Phase 3 Baseline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install app dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Run baseline suite
        id: baseline
        continue-on-error: true
        working-directory: tests
        run: npm run phase3:baseline

      - name: Upload baseline report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase3-baseline-report
          path: tests/PHASE_3_BASELINE_REPORT.md
          if-no-files-found: warn

      - name: Upload baseline history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase3-baseline-history
          path: tests/PHASE_3_BASELINE_HISTORY.json
          if-no-files-found: warn

      - name: Append baseline summary
        if: always()
        working-directory: tests
        run: |
          echo "## Phase 3 Baseline" >> "$GITHUB_STEP_SUMMARY"
          if [ -f PHASE_3_BASELINE_REPORT.md ]; then
            echo "Baseline report generated successfully." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            sed -n '1,24p' PHASE_3_BASELINE_REPORT.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Baseline report file not found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail when baseline failed
        if: steps.baseline.outcome == 'failure'
        run: exit 1

  phase3-package-smoke:
    name: Phase 3 Package Smoke
    runs-on: ubuntu-latest
    needs: phase3-baseline
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install app dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Run package smoke test
        id: package_smoke
        continue-on-error: true
        working-directory: tests
        run: npm run phase3:package-smoke

      - name: Upload package smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase3-package-smoke-report
          path: tests/PHASE_3_PACKAGE_SMOKE_REPORT.md
          if-no-files-found: warn

      - name: Append package smoke summary
        if: always()
        working-directory: tests
        run: |
          echo "## Phase 3 Package Smoke" >> "$GITHUB_STEP_SUMMARY"
          if [ -f PHASE_3_PACKAGE_SMOKE_REPORT.md ]; then
            echo "Package smoke report generated successfully." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            sed -n '1,24p' PHASE_3_PACKAGE_SMOKE_REPORT.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Package smoke report file not found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail when smoke failed
        if: steps.package_smoke.outcome == 'failure'
        run: exit 1